<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Cam Heikens</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Monoton&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>



<section class="contact" id="contact">
  <img src="egg.webp" id="dvdBounce" class="dvd-bounce" alt="Bouncing logo">
  <div id="cornerFlash" class="corner-flash"></div>
  <div class="contact-content">
    <h1>Get In Touch</h1>
    <h2 class="tagline">Have a project, question, or opportunity? </h2>
        
    <p> Try to contact me... &nbsp;&nbsp;&nbsp;&nbsp; I'll probably ask for money</p>
    

    <form class="contact-form" id="contactForm">
    <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
    </div>

    <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>
    </div>

    <button type="submit" class="submit-btn">Send Message</button>
    <p id="formStatus" style="display:none; color:#66b3ff; margin-top:12px;"></p>
    </form>

    <div class="contact-links">
      <a href="mailto:camsrealbusinessemail@gmail.com">Email</a>
      <a href="https://www.youtube.com/watch?v=ORrPERJnoNQ&list=LL&index=226" target="_blank">LinkedIn</a>
      <a href="https://www.croxsons.com/wp-content/uploads/2024/02/Sparkling-Wine-cork.png.webp" target="_blank">GitHub</a>
    </div>
  </div>

  <nav class="nav-links">

    <a href="projects.html">Projects</a>
    <a href="skills.html">Skills</a>
    <a href="contact.html">Contact</a>
  </nav>
</section>

  <script src="script.js"></script>

</body>
</html>
